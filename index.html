<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>eKeberadaan Guru</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
    .loader { border-top-color: #3498db; animation: spinner 1.5s linear infinite; }
    @keyframes spinner { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body class="min-h-screen pb-12">

  <nav class="bg-blue-700 text-white p-4 shadow-lg sticky top-0 z-50">
    <div class="container mx-auto flex justify-between items-center">
      <h1 class="font-bold text-lg"><i class="fas fa-user-check mr-2"></i> eKeberadaan</h1>
      <div>
        <button onclick="showPage('user')" class="px-3 py-1 hover:bg-blue-600 rounded text-sm">Utama</button>
        <button onclick="loginAdmin()" class="px-3 py-1 bg-blue-800 hover:bg-blue-900 rounded text-sm ml-2">Admin</button>
      </div>
    </div>
  </nav>

  <div class="container mx-auto p-4 max-w-md md:max-w-4xl">
    <div id="loadingOverlay" class="fixed inset-0 bg-gray-900 bg-opacity-50 flex items-center justify-center hidden z-[100]">
      <div class="bg-white p-5 rounded-lg flex flex-col items-center">
        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-12 w-12 mb-4"></div>
        <p class="text-gray-700 font-semibold">Memproses data...</p>
      </div>
    </div>

    <!-- HALAMAN PENGGUNA -->
    <div id="userPage" class="page">
      <div class="bg-white p-6 rounded-xl shadow-md">
        <h2 class="text-xl font-bold mb-6 text-gray-800 border-b pb-2">Borang Keberadaan</h2>
        <form id="presenceForm" onsubmit="handleFormSubmit(event)">
          <div class="mb-4 relative">
            <label class="block text-sm font-semibold text-gray-700 mb-1">Nama Guru</label>
            <input type="text" id="teacherSearch" placeholder="Cari nama anda..." 
                   class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                   oninput="searchTeacher(this.value)" autocomplete="off">
            <div id="searchDropdown" class="absolute w-full bg-white border rounded-b-lg shadow-xl max-h-48 overflow-y-auto hidden z-10"></div>
            <input type="hidden" id="selectedNama" name="nama" required>
          </div>
          <div class="mb-4">
            <label class="block text-sm font-semibold text-gray-700 mb-1">Urusan</label>
            <select id="urusan" name="urusan" class="w-full p-3 border rounded-lg" onchange="toggleFields(this.value)" required>
              <option value="">-- Pilih Urusan --</option>
              <option value="KELUAR WAKTU BEKERJA / URUSAN DALAMAN">KELUAR SEBENTAR</option>
              <option value="URUSAN RASMI">URUSAN RASMI</option>
              <option value="CUTI">CUTI</option>
            </select>
          </div>
          <div id="dynamicFields" class="space-y-4"></div>
          <button type="submit" class="w-full bg-blue-600 text-white font-bold py-3 rounded-lg mt-6 hover:bg-blue-700 transition">SIMPAN</button>
        </form>
      </div>
    </div>

    <!-- HALAMAN ADMIN -->
    <div id="adminPage" class="page hidden">
      <div class="bg-white p-6 rounded-xl shadow-md">
        <h2 class="text-xl font-bold mb-4 text-gray-800">Panel Pentadbir</h2>
        <p class="text-gray-600 mb-4 text-sm">Sistem sedang berjalan dalam mod integrasi.</p>
        <button onclick="showPage('user')" class="bg-gray-200 px-4 py-2 rounded text-sm font-bold">Kembali</button>
      </div>
    </div>
  </div>

  <script>
    // URL WEB APP GAS ANDA
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwkI-O9dzp8oaxZL4HV320uSGECH2Wq_MZ7ZwImjDhYPRwJ_8DCqj2EOvq-sHqDyd2B-w/exec";
    
    let allTeachers = [];

    /**
     * Fungsi Callback untuk JSONP
     * Google Apps Script akan memanggil fungsi ini secara automatik
     */
    function handleData(data) {
      allTeachers = data || [];
      console.log("Data berjaya diterima melalui JSONP:", allTeachers.length);
      toggleLoading(false);
    }

    /**
     * Fungsi fetchTeachers menggunakan teknik JSONP
     * Ini memintas sekatan CORS yang menyebabkan "Failed to fetch"
     */
    function fetchTeachers() {
      toggleLoading(true);
      
      // Jika dalam Google Apps Script Environment
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run.withSuccessHandler(data => {
          allTeachers = data || [];
          toggleLoading(false);
        }).getTeachers();
        return;
      }

      // Gunakan JSONP untuk Vercel/External
      const script = document.createElement('script');
      // Pastikan GAS backend anda menyokong parameter 'callback'
      script.src = `${GAS_URL}?action=getTeachers&callback=handleData`;
      
      // Pengendalian ralat jika skrip gagal dimuatkan
      script.onerror = function() {
        console.error("Ralat JSONP: Gagal memuatkan skrip.");
        allTeachers = [
          {nama: "Sila Pastikan GAS Anda Menyokong JSONP", jawatan: "Ralat"},
          {nama: "Gunakan 'ContentService' Dengan Parameter Callback", jawatan: "Info"}
        ];
        toggleLoading(false);
      };

      document.body.appendChild(script);
    }

    function searchTeacher(val) {
      const dropdown = document.getElementById('searchDropdown');
      if (val.length < 2) { dropdown.classList.add('hidden'); return; }
      const matches = allTeachers.filter(t => t.nama && t.nama.toLowerCase().includes(val.toLowerCase()));
      if (matches.length > 0) {
        dropdown.innerHTML = matches.map(t => `
          <div class="p-3 hover:bg-blue-50 cursor-pointer border-b text-sm" onclick="selectTeacher('${t.nama}')">
            ${t.nama} <span class="text-xs text-gray-400">(${t.jawatan || ''})</span>
          </div>
        `).join('');
        dropdown.classList.remove('hidden');
      } else {
        dropdown.classList.add('hidden');
      }
    }

    function selectTeacher(nama) {
      document.getElementById('teacherSearch').value = nama;
      document.getElementById('selectedNama').value = nama;
      document.getElementById('searchDropdown').classList.add('hidden');
    }

    function toggleFields(val) {
      const container = document.getElementById('dynamicFields');
      container.innerHTML = "";
      if (!val) return;

      if (val === "KELUAR WAKTU BEKERJA / URUSAN DALAMAN") {
        container.innerHTML = `
          <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1">Masa Keluar</label>
          <input type="time" name="masa_keluar" class="w-full p-2 border rounded-md" required></div>
          <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1">Tujuan</label>
          <input type="text" name="tujuan" class="w-full p-2 border rounded-md" placeholder="Contoh: Klinik, Bank" required></div>`;
      } else if (val === "URUSAN RASMI" || val === "CUTI") {
        container.innerHTML = `
          <div><label class="block text-xs font-bold text-gray-500 uppercase mb-1">Catatan</label>
          <textarea name="catatan" class="w-full p-2 border rounded-md" placeholder="Sila nyatakan jenis urusan/cuti"></textarea></div>`;
      }
    }

    async function handleFormSubmit(e) {
      e.preventDefault();
      const formData = new FormData(e.target);
      const data = Object.fromEntries(formData.entries());
      
      toggleLoading(true);
      try {
        if (typeof google !== 'undefined' && google.script && google.script.run) {
          google.script.run.withSuccessHandler(() => {
            alert("Rekod berjaya disimpan!");
            location.reload();
          }).saveRecord(data);
        } else {
          // POST ke GAS (Gunakan no-cors untuk mengelakkan ralat preflight)
          await fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify(data),
            headers: { 'Content-Type': 'application/json' }
          });
          
          alert("Permintaan hantar data diproses. Sila semak Sheet anda sebentar lagi.");
          location.reload();
        }
      } catch (err) {
        console.error("Gagal menghantar:", err);
        alert("Ralat teknikal berlaku semasa menghantar data.");
      } finally {
        toggleLoading(false);
      }
    }

    function toggleLoading(show) {
      const loader = document.getElementById('loadingOverlay');
      if (loader) loader.classList.toggle('hidden', !show);
    }

    function showPage(page) {
      document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
      const p = document.getElementById(page + 'Page');
      if (p) p.classList.remove('hidden');
    }

    function loginAdmin() {
      const pass = prompt("Sila masukkan kata laluan admin:");
      if (pass === "admin123") showPage('admin');
      else if (pass !== null) alert("Kata laluan salah!");
    }

    document.addEventListener('DOMContentLoaded', fetchTeachers);
  </script>
</body>
</html>
